name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install build tools and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-4.0 libadwaita-1-dev \
                                dpkg-dev debhelper libglib2.0-dev-bin python3-pip python3-venv \
                                appstream-util desktop-file-utils fuse \
                                build-essential python3-all dh-python python3-wheel pybuild-plugin-pyproject
                                
    - name: Set up Python Virtual Environment
      run: |
        python3 -m venv .venv --system-site-packages
        .venv/bin/pip install --upgrade pip build setuptools wheel

    - name: Compile GResource
      run: |
        make run
        
    - name: Build Python packages (Wheel & Source)
      run: .venv/bin/python -m build
      
    - name: Build Debian Package (.deb)
      run: |
        make deb
        
    - name: Build Tarball (.tar.gz)
      run: |
        make dist-tar
        
    - name: Build Flatpak (.flatpak)
      run: |
        sudo apt-get install -y flatpak flatpak-builder
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        flatpak-builder --user --install-deps-from=flathub --force-clean --repo=repo build-dir packaging/flatpak/dev.linux_iprojection.LinuxIProjection.yml
        flatpak build-bundle repo dist/linux-iprojection-linux.flatpak dev.linux_iprojection.LinuxIProjection
        
    - name: Create Advanced GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.whl
          dist/*.tar.gz
          dist/*.deb
          dist/*.flatpak
        generate_release_notes: true
        name: "iProjection for Linux Release ${{ github.ref_name }}"
        body: |
          🚀 **New Release for iProjection (Linux)**
          # Linux-iProjection ${{ github.ref_name }}
          
          Excited to announce **${{ github.ref_name }}** of Linux-iProjection, a native Linux control & casting app for Epson projectors (ESC/VP.net + EShare). This release brings significant stability, performance upgrades, and quality-of-life improvements.
          
          ## 🚀 What's New in ${{ github.ref_name }}
          
          *(Auto-generated from merged pull requests and commits)*
          
          ---
          
          ### 📦 Assets Available
          - **.deb**: For Debian, Ubuntu, Linux Mint, Pop!_OS
          - **.flatpak**: Universal sandboxed Linux binary (Recommended)
          - **.tar.gz**: Source code & Arch/AUR PKGBUILD integration
          - **.whl**: Standard Python Wheel
          
          ---
          
          ## 📦 Installation Options
          
          ### 1.🛠️ Quick Install
          ```bash
          sudo dpkg -i linux-iprojection_*.deb
          sudo apt-get install -f
          ```
          
          ### 2. Arch Linux (AUR)
          If you are on Arch Linux, Manjaro, or EndeavourOS, CachyOS, you can install directly from the Arch User Repository.
          ```bash
          yay -S linux-iprojection
          # or
          paru -S linux-iprojection
          ```
          
          ### 3. Ubuntu / Debian / Linux Mint (PPA)
          For Debian-based distributions, add the official PPA repository.
          ```bash
          sudo add-apt-repository ppa:cyber-trinity/linux-iprojection
          sudo apt update
          sudo apt install linux-iprojection
          ```
          
          ### 4. Python Virtual Environment (Recommended for Developers)
          The easiest way to install across any distribution using PyPI.
          ```bash
          # Clone the repository
          git clone https://github.com/John-Varghese-EH/Linux-iProjection.git
          cd Linux-iProjection
          
          # Create a virtual environment with system packages (required for GTK)
          python3 -m venv .venv --system-site-packages
          source .venv/bin/activate
          
          # Install the application
          pip install -e .
          
          # Run the app
          linux-iprojection
          ```
          
          ### 5. Flatpak (Universal Linux via Flathub)
          To run in an isolated sandbox across Fedora, Ubuntu, Arch, or openSUSE, use Flatpak.
          ```bash
          # Add the flathub remote if you haven't already
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          
          # Install Linux-iProjection
          flatpak install flathub io.github.JohnVarghese.LinuxiProjection
          
          # Run it
          flatpak run io.github.JohnVarghese.LinuxiProjection
          ```
          
          ---
          
          *Built with ❤️ by John Varghese (J0X) | Fueled by ☕️ and rainy days.*
          
          **Full Changelog**: https://github.com/John-Varghese-EH/Linux-iProjection/compare/${{ github.event.before }}...${{ github.ref_name }}
