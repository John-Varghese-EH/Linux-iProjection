# epsonctl — Built by John Varghese (J0X) | https://github.com/John-Varghese-EH
app-id: dev.epsonctl.EpsonCtl
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: epsonctl
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-config/epsonctl:create
  - --talk-name=org.freedesktop.portal.Desktop
modules:
  - name: python3-zeroconf
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app zeroconf
    sources:
      - type: pypi
        name: zeroconf
  - name: epsonctl
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app .
      - install -Dm644 data/dev.epsonctl.EpsonCtl.desktop /app/share/applications/dev.epsonctl.EpsonCtl.desktop
      - install -Dm644 data/dev.epsonctl.EpsonCtl.metainfo.xml /app/share/metainfo/dev.epsonctl.EpsonCtl.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/dev.epsonctl.EpsonCtl.svg /app/share/icons/hicolor/scalable/apps/dev.epsonctl.EpsonCtl.svg
    sources:
      - type: dir
        path: ../../
