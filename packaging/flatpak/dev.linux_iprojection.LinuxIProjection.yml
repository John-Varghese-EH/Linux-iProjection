# linux-iprojection - Built by John Varghese (J0X) | https://github.com/John-Varghese-EH
app-id: dev.linux_iprojection.LinuxIProjection
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: linux-iprojection
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-config/linux-iprojection:create
  - --talk-name=org.freedesktop.portal.Desktop
modules:
  - name: python3-zeroconf
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --break-system-packages zeroconf
  - name: linux-iprojection
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app --break-system-packages .
      - install -Dm644 data/dev.linux_iprojection.LinuxIProjection.desktop /app/share/applications/dev.linux_iprojection.LinuxIProjection.desktop
      - install -Dm644 data/dev.linux_iprojection.LinuxIProjection.metainfo.xml /app/share/metainfo/dev.linux_iprojection.LinuxIProjection.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/dev.linux_iprojection.LinuxIProjection.svg /app/share/icons/hicolor/scalable/apps/dev.linux_iprojection.LinuxIProjection.svg
    sources:
      - type: dir
        path: ../../
